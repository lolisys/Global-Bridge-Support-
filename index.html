<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bridge Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .blinking { animation: blink 1s linear infinite; }
        
        .landing-bg {
            background-image: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%), url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1170&q=80');
            background-size: cover;
            background-position: center;
        }

        /* Styles specifically for the Login/Profile Form */
        .form-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-header-img {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            height: 220px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .input-field {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 12px 16px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
            color: #374151;
        }

        .input-field:focus {
            border-color: #3b82f6;
        }

        .label-text {
            font-size: 11px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }

        .btn-outline-brown {
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            background-color: rgba(62, 39, 35, 0.4);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div id="app-container"></div>

    <script>
        const CATEGORIES = [
            "Education",
            "Medical & Healthcare",
            "Orphanage Support",
            "Small Business Start-up",
            "Clean Water Project",
            "Emergency Relief",
            "Food Security"
        ];

        const PARTNERS = [
            { name: "Sendwave", icon: "📱", region: "Africa & SE Asia", link: "https://play.google.com/store/apps/details?id=com.sendwave", desc: "Instant Mobile Money transfers." },
            { name: "Remitly", icon: "⚡", region: "Asia & LatAm", link: "https://play.google.com/store/apps/details?id=com.remitly.app", desc: "Reliable bank deposits." },
            { name: "Wise", icon: "🌍", region: "Europe & NA", link: "https://play.google.com/store/apps/details?id=com.transferwise.android", desc: "Real mid-market exchange rates." },
            { name: "WorldRemit", icon: "🛰️", region: "Global Reach", link: "https://play.google.com/store/apps/details?id=com.worldremit.android", desc: "Send to 130+ countries." },
            { name: "RIA Money", icon: "🏦", region: "Americas & Europe", link: "https://play.google.com/store/apps/details?id=com.riafinancial.moneytransfer", desc: "Massive cash pickup network." },
            { name: "Transfast", icon: "🧧", region: "Middle East & India", link: "https://play.google.com/store/apps/details?id=com.transfast.app", desc: "Direct-to-bank specialist." }
        ];

        let state = JSON.parse(localStorage.getItem('gb_state')) || {
            currentPage: 'landing',
            user: null,
            walletBalance: 0,
            raised: 0,
            hasDonation: false,
            profiles: [],
            selectedCountry: ""
        };

        function saveState() { localStorage.setItem('gb_state', JSON.stringify(state)); }
        function navigate(page) { state.currentPage = page; saveState(); render(); }

        function render() {
            const container = document.getElementById('app-container');
            
            if (state.currentPage === 'landing') {
                container.innerHTML = `
                    <div class="h-screen landing-bg flex flex-col justify-between overflow-hidden">
                        <header class="flex justify-between items-center px-5 py-4 bg-white/95 shadow-sm">
                            <div class="flex items-center gap-2">
                                <div class="bg-[#2563eb] w-6 h-6 rounded flex items-center justify-center font-bold text-white text-sm">G</div>
                                <span class="font-bold text-[#2563eb] text-lg tracking-tight">Global Bridge</span>
                            </div>
                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Secure Verified Engine</span>
                        </header>

                        <div class="flex-1 flex flex-col items-center justify-center p-6 text-white text-center">
                            <h1 class="text-[32px] font-bold leading-[1.1] mb-1">Empowering<br>Communities</h1>
                            <h2 class="text-[32px] font-bold text-[#4c84ff] leading-[1.1] mb-6">Through Direct Giving</h2>
                            <div class="flex gap-4 w-full max-w-sm">
                                <button onclick="navigate('login')" class="flex-1 btn-outline-brown text-white py-3.5 rounded-lg font-bold text-xs uppercase">I need support</button>
                                <button onclick="navigate('dashboard')" class="flex-1 bg-[#2563eb] text-white py-3.5 rounded-lg font-bold text-xs uppercase">I want to support</button>
                            </div>
                        </div>
                    </div>`;
            } 

            else if (state.currentPage === 'login') {
                container.innerHTML = `
                    <div class="min-h-screen bg-gray-50 flex flex-col">
                        <nav class="flex justify-between items-center px-6 py-4 bg-white">
                            <div class="flex items-center gap-2">
                                <div class="bg-[#2563eb] w-6 h-6 rounded flex items-center justify-center font-bold text-white text-sm">G</div>
                                <span class="font-bold text-[#2563eb] text-lg tracking-tight">Global Bridge</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">SECURE VERIFIED ENGINE</span>
                                <button onclick="navigate('landing')">
                                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                                </button>
                            </div>
                        </nav>

                        <div class="flex-1 p-4 md:p-8 flex justify-center items-start">
                            <div class="w-full max-w-2xl form-card overflow-hidden">
                                <div class="form-header-img">
                                    <h1 class="text-white text-4xl font-bold mb-2">Join the Bridge</h1>
                                    <p class="text-white text-sm font-medium opacity-90">Your story matters. Let us help you tell it to the world.</p>
                                </div>

                                <form onsubmit="handleLogin(event)" class="p-8 space-y-6">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <label class="label-text">Full Name</label>
                                            <input type="text" id="fullName" placeholder="" required class="input-field">
                                        </div>
                                        <div>
                                            <label class="label-text">Location</label>
                                            <input type="text" id="countryInput" placeholder="UK London" required class="input-field bg-gray-50/50">
                                        </div>
                                    </div>

                                    <div>
                                        <label class="label-text">Category</label>
                                        <select id="category" required class="input-field appearance-none bg-white">
                                            ${CATEGORIES.map(cat => `<option value="${cat}">${cat}</option>`).join('')}
                                        </select>
                                    </div>

                                    <div>
                                        <label class="label-text">Support Goal (USD) amount need for your fundraising</label>
                                        <div class="relative">
                                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">$</span>
                                            <input type="number" id="goal" placeholder="Amount in $" required class="input-field pl-8">
                                        </div>
                                    </div>

                                    <div class="hidden">
                                        <input type="text" id="accName" value="Verified Account">
                                        <input type="text" id="accNum" value="GB-7788">
                                    </div>

                                    <div>
                                        <label class="label-text">Your Story</label>
                                        <textarea id="story" placeholder="Tell donors about your situation..." required class="input-field h-32 resize-none"></textarea>
                                    </div>

                                    <button type="submit" class="w-full bg-[#2563eb] text-white py-4 rounded-xl font-bold text-sm shadow-lg hover:bg-blue-700 transition-colors">
                                        Submit Profile for Verification
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>`;
            }

            else if (state.currentPage === 'dashboard') {
                container.innerHTML = `
                    <div class="min-h-screen bg-gray-100 pb-20">
                        <header class="bg-white shadow-md p-4 sticky top-0 z-10 flex justify-between items-center">
                            <h1 class="text-lg font-black text-blue-800 uppercase tracking-tighter">Verified Profiles</h1>
                            <button onclick="navigate('wallet')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-[10px] uppercase">My Wallet</button>
                        </header>
                        <div class="p-4 space-y-4 max-w-xl mx-auto">
                            <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl p-5 shadow-xl text-white">
                                <div class="flex items-center gap-4 mb-4">
                                    <div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center text-3xl border border-white/30">🌍</div>
                                    <div>
                                        <h3 class="font-bold text-lg">${state.user.fullName}</h3>
                                        <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest">${state.user.country}</p>
                                    </div>
                                </div>
                                <div class="flex justify-between text-[10px] font-black mb-1 uppercase tracking-wider">
                                    <span>Raised: $${state.raised}</span>
                                    <span>Goal: $${state.user.goal}</span>
                                </div>
                                <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden mb-4">
                                    <div class="bg-green-400 h-full transition-all" style="width: ${Math.min((state.raised/state.user.goal)*100, 100)}%"></div>
                                </div>
                                <button onclick="navigate('wallet')" class="w-full bg-white text-blue-800 py-2.5 rounded-xl text-[10px] font-black uppercase">Open Digital Wallet</button>
                            </div>
                        </div>
                    </div>`;
            }
            // ... (Wallet view remains same as original)
        }

        function handleLogin(e) {
            e.preventDefault();
            state.user = { 
                fullName: document.getElementById('fullName').value, 
                country: document.getElementById('countryInput').value, 
                goal: document.getElementById('goal').value,
                accName: "Verified",
                accNum: "ID-1002"
            };
            const msg = "Verifying profile for global support...";
            showLoading(msg, 3000, () => { navigate('dashboard'); });
        }

        function showLoading(msg, time, cb) {
            const l = document.createElement('div');
            l.className = "fixed inset-0 bg-black/90 z-[300] flex flex-col items-center justify-center p-10 text-center";
            l.innerHTML = `<div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div><p class="text-white font-bold uppercase tracking-widest text-xs">${msg}</p>`;
            document.body.appendChild(l);
            setTimeout(() => { l.remove(); cb(); }, time);
        }

        render();
    </script>
</body>
</html>
